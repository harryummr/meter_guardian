name: meter_guardian
description: "Meter Guardian - Multi-meter electricity tariff slab tracker for Pakistan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # OCR
  google_mlkit_text_recognition: ^0.13.0
  image: ^4.2.0

  # Camera / gallery
  image_picker: ^1.1.2
  camera: ^0.10.6

  # Charts
  fl_chart: ^0.68.0

  # Permissions
  permission_handler: ^11.3.1

  # Date / number formatting
  intl: ^0.19.0

  # Export
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.6
  share_plus: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Utilities
  uuid: ^4.4.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
